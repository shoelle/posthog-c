name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Native build + tests on all three desktop platforms. Each links its own
  # system TLS (WinHTTP / Secure Transport / OpenSSL); the suite itself uses the
  # mock transport (no network), so this proves the transports compile and link.
  native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
      - name: Install OpenSSL headers (Linux TLS backend)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libssl-dev
      - name: Build
        run: zig build
      - name: Test
        run: zig build test
      - name: ReleaseSafe
        run: zig build -Doptimize=ReleaseSafe test

  sanitizer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
      - name: Install OpenSSL headers (Linux TLS backend)
        run: sudo apt-get install -y libssl-dev
      - name: ASan + UBSan
        shell: bash
        run: |
          zig cc -std=c11 -D_GNU_SOURCE -fsanitize=address,undefined -fno-omit-frame-pointer \
            -Iinclude -Isrc -Ithird_party/sdefl \
            src/*.c tests/test_*.c tests/mock_transport.c \
            -lpthread -ldl -lssl -lcrypto -o posthog_tests_san
          ./posthog_tests_san

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
      - name: Install OpenSSL headers (Linux TLS backend)
        run: sudo apt-get install -y libssl-dev
      - name: Bounded parser fuzz
        run: zig build -Doptimize=ReleaseSafe fuzz

  package-consumer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
      - name: Install OpenSSL headers (Linux TLS backend)
        run: sudo apt-get install -y libssl-dev
      - name: Build as a downstream Zig dependency
        working-directory: tests/consumer
        run: zig build run

  # WASM backend: compile the window.posthog shim with emcc and run the Node
  # parity harness (mocked window.posthog).
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
      - uses: mymindstorm/setup-emsdk@6ab9eb1bda2574c4ddb79809fc9247783eaf9021 # v14
        with:
          version: 3.1.64
      - name: Build + test WASM
        run: zig build test-wasm

  # Real HTTPS delivery to PostHog, gated on the whole build+test matrix above so
  # we never send real events (or spend Actions minutes) on a broken tree. Runs
  # only on a push to main or a manual dispatch - PRs and feature branches skip
  # it. Each leg exercises one TLS backend end to end (WinHTTP / Secure Transport
  # / OpenSSL) and tags its event with the OS. A fork has no secret, so it skips
  # cleanly (green) rather than failing red.
  live-contract:
    needs: [native, sanitizer, fuzz, package-consumer, wasm]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    environment: posthog-live
    env:
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
      POSTHOG_DISTINCT_ID: posthog-c-contract-${{ matrix.os }}
      POSTHOG_FLAG_KEY: ${{ vars.POSTHOG_FLAG_KEY }}
      POSTHOG_EXPECT_FLAG: ${{ vars.POSTHOG_EXPECT_FLAG }}
      POSTHOG_EXPECT_PAYLOAD: ${{ vars.POSTHOG_EXPECT_PAYLOAD }}
    steps:
      - name: Credentials present?
        id: gate
        shell: bash
        run: |
          if [ -n "$POSTHOG_API_KEY" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "::notice::POSTHOG_API_KEY not set; skipping the live contract."
          fi
      - if: steps.gate.outputs.go == 'true' && runner.os == 'Linux'
        name: Install OpenSSL (Linux TLS backend)
        run: sudo apt-get install -y libssl-dev
      - if: steps.gate.outputs.go == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - if: steps.gate.outputs.go == 'true'
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
      - if: steps.gate.outputs.go == 'true'
        name: Ingestion, flags, payload, and exposure contract
        run: zig build -Doptimize=ReleaseSafe live-contract
