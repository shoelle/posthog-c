name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:

jobs:
  # Native build + tests on all three desktop platforms. Windows exercises the
  # WinHTTP TLS path; Linux/macOS confirm the pthreads + POSIX-sockets paths
  # compile and the suite is green (tests use the mock transport, no network).
  native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2
      - name: Build
        run: zig build
      - name: Test
        run: zig build test
      - name: ReleaseSafe
        run: zig build -Doptimize=ReleaseSafe test

  sanitizer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2
      - name: ASan + UBSan
        shell: bash
        run: |
          zig cc -std=c11 -D_GNU_SOURCE -fsanitize=address,undefined -fno-omit-frame-pointer \
            -Iinclude -Isrc -Ithird_party/sdefl \
            src/*.c tests/test_*.c tests/mock_transport.c \
            -lpthread -ldl -o posthog_tests_san
          ./posthog_tests_san

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2
      - name: Bounded parser fuzz
        run: zig build -Doptimize=ReleaseSafe fuzz

  package-consumer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2
      - name: Build as a downstream Zig dependency
        working-directory: tests/consumer
        run: zig build run

  # WASM backend: compile the window.posthog shim with emcc and run the Node
  # parity harness (mocked window.posthog).
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2
      - uses: mymindstorm/setup-emsdk@6ab9eb1bda2574c4ddb79809fc9247783eaf9021 # v14
        with:
          version: 3.1.64
      - name: Build + test WASM
        run: zig build test-wasm
